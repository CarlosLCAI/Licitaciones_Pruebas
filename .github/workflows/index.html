<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Monitor Licitaciones · CAI Consultores</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;500;600&family=Barlow+Condensed:wght@500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --teal: #07AAAA;
    --teal-dark: #055f5f;
    --navy: #18303C;
    --pink: #ED2E63;
    --paper: #F7F6F2;
    --ink: #1a1a1a;
    --ink-soft: #565650;
    --border: #d7d5cc;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    background: var(--paper);
    background-image:
      linear-gradient(var(--border) 1px, transparent 1px),
      linear-gradient(90deg, var(--border) 1px, transparent 1px);
    background-size: 24px 24px;
    background-attachment: fixed;
    font-family: 'Barlow', sans-serif;
    color: var(--ink);
  }
  .wrap { max-width: 1180px; margin: 0 auto; padding: 32px 24px 64px; }
  .cajetin {
    background: #fff;
    border: 1.5px solid var(--navy);
    display: grid;
    grid-template-columns: 1.4fr 1fr 1fr 1fr;
    margin-bottom: 28px;
  }
  .cajetin > div {
    padding: 14px 18px;
    border-left: 1px solid var(--border);
  }
  .cajetin > div:first-child { border-left: none; }
  .cajetin .label {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 11px;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: var(--ink-soft);
    margin: 0 0 4px;
  }
  .cajetin .value {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 600;
    font-size: 17px;
    color: var(--navy);
    margin: 0;
  }
  .cajetin .value.teal { color: var(--teal-dark); }
  .controls {
    display: flex;
    gap: 10px;
    margin-bottom: 18px;
    flex-wrap: wrap;
  }
  .controls input, .controls select {
    font-family: 'Barlow', sans-serif;
    font-size: 14px;
    padding: 8px 12px;
    border: 1px solid var(--border);
    background: #fff;
    color: var(--ink);
  }
  .controls input { flex: 1; min-width: 220px; }
  table {
    width: 100%;
    border-collapse: collapse;
    background: #fff;
    border: 1px solid var(--border);
    font-size: 13.5px;
  }
  thead th {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 600;
    font-size: 11.5px;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    text-align: left;
    color: #fff;
    background: var(--navy);
    padding: 10px 12px;
    cursor: pointer;
    user-select: none;
    white-space: nowrap;
  }
  thead th:hover { background: var(--teal-dark); }
  tbody td {
    padding: 10px 12px;
    border-top: 1px solid var(--border);
    vertical-align: top;
  }
  tbody tr:hover { background: #f0faf9; }
  .titulo { font-weight: 500; max-width: 340px; }
  .mono { font-family: 'JetBrains Mono', monospace; font-size: 12.5px; color: var(--ink-soft); }
  .importe { font-family: 'JetBrains Mono', monospace; text-align: right; white-space: nowrap; }
  .badge {
    display: inline-block;
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.04em;
    padding: 2px 8px;
    border-radius: 2px;
  }
  .badge-PUB { background: #e1f5ee; color: #085041; }
  .badge-EV { background: #e6f1fb; color: #0c447c; }
  .badge-ADJ { background: #fbeaf0; color: #72243e; }
  .badge-other { background: #f1efe8; color: #444441; }
  .links a {
    display: inline-block;
    margin-right: 8px;
    font-size: 12px;
    color: var(--teal-dark);
    text-decoration: none;
    border-bottom: 1px dotted var(--teal-dark);
  }
  .links a:hover { color: var(--pink); border-color: var(--pink); }
  .empty {
    text-align: center;
    padding: 60px 20px;
    color: var(--ink-soft);
    font-size: 14px;
  }
  .empty strong { display: block; font-size: 16px; color: var(--navy); margin-bottom: 6px; }
</style>
</head>
<body>
<div class="wrap">

  <div class="cajetin">
    <div>
      <p class="label">Monitor</p>
      <p class="value">CAI Consultores</p>
    </div>
    <div>
      <p class="label">Ámbito</p>
      <p class="value teal">Andalucía · ES61</p>
    </div>
    <div>
      <p class="label">Resultados</p>
      <p class="value teal" id="total-count">—</p>
    </div>
    <div>
      <p class="label">Última actualización</p>
      <p class="value" id="last-update">—</p>
    </div>
  </div>

  <div class="controls">
    <input type="text" id="buscar" placeholder="Buscar por título, órgano o expediente">
    <select id="filtro-estado">
      <option value="">Todos los estados</option>
    </select>
  </div>

  <div id="contenido">
    <p class="empty">Cargando…</p>
  </div>

</div>

<script>
let datos = [];
let ordenColumna = 'updated';
let ordenAsc = false;

function formatearImporte(v) {
  if (!v) return '—';
  const n = parseFloat(v.replace(/\./g, '').replace(',', '.'));
  if (isNaN(n)) return v;
  return n.toLocaleString('es-ES', { maximumFractionDigits: 0 }) + ' €';
}

function formatearFecha(v) {
  if (!v) return '—';
  const d = new Date(v);
  if (isNaN(d)) return v;
  return d.toLocaleDateString('es-ES', { day: '2-digit', month: '2-digit', year: 'numeric' });
}

function badgeClass(estado) {
  return ['PUB', 'EV', 'ADJ'].includes(estado) ? 'badge-' + estado : 'badge-other';
}

function renderTabla(lista) {
  const cont = document.getElementById('contenido');
  if (!lista.length) {
    cont.innerHTML = '<div class="empty"><strong>Sin resultados</strong>El monitor diario aún no ha detectado licitaciones que coincidan con el filtro, o la búsqueda no encuentra coincidencias.</div>';
    return;
  }
  let html = '<table><thead><tr>' +
    '<th data-col="folder_id">Expediente</th>' +
    '<th data-col="titulo">Título</th>' +
    '<th data-col="organo">Órgano</th>' +
    '<th data-col="importe">Importe</th>' +
    '<th data-col="estado">Estado</th>' +
    '<th data-col="updated">Fecha</th>' +
    '<th>Documentos</th>' +
    '</tr></thead><tbody>';
  for (const r of lista) {
    html += '<tr>' +
      '<td class="mono">' + (r.folder_id || '—') + '</td>' +
      '<td class="titulo">' + (r.titulo || '—') + '</td>' +
      '<td>' + (r.organo || '—') + '</td>' +
      '<td class="importe">' + formatearImporte(r.importe) + '</td>' +
      '<td><span class="badge ' + badgeClass(r.estado) + '">' + (r.estado || '—') + '</span></td>' +
      '<td class="mono">' + formatearFecha(r.updated) + '</td>' +
      '<td class="links">' +
        (r.link ? '<a href="' + r.link + '" target="_blank" rel="noopener">Ficha</a>' : '') +
        (r.pcap_url ? '<a href="' + r.pcap_url + '" target="_blank" rel="noopener">PCAP</a>' : '') +
        (r.ppt_url ? '<a href="' + r.ppt_url + '" target="_blank" rel="noopener">PPT</a>' : '') +
      '</td>' +
    '</tr>';
  }
  html += '</tbody></table>';
  cont.innerHTML = html;

  cont.querySelectorAll('th[data-col]').forEach(th => {
    th.addEventListener('click', () => {
      const col = th.dataset.col;
      if (ordenColumna === col) { ordenAsc = !ordenAsc; } else { ordenColumna = col; ordenAsc = true; }
      aplicarFiltros();
    });
  });
}

function poblarFiltroEstado() {
  const select = document.getElementById('filtro-estado');
  const estados = [...new Set(datos.map(d => d.estado).filter(Boolean))];
  for (const e of estados) {
    const opt = document.createElement('option');
    opt.value = e;
    opt.textContent = e;
    select.appendChild(opt);
  }
}

function aplicarFiltros() {
  const texto = document.getElementById('buscar').value.toLowerCase();
  const estado = document.getElementById('filtro-estado').value;

  let filtrados = datos.filter(d => {
    const coincideTexto = !texto ||
      (d.titulo && d.titulo.toLowerCase().includes(texto)) ||
      (d.organo && d.organo.toLowerCase().includes(texto)) ||
      (d.folder_id && d.folder_id.toLowerCase().includes(texto));
    const coincideEstado = !estado || d.estado === estado;
    return coincideTexto && coincideEstado;
  });

  filtrados.sort((a, b) => {
    let va = a[ordenColumna] || '';
    let vb = b[ordenColumna] || '';
    if (ordenColumna === 'importe') {
      va = parseFloat((va || '0').replace(/\./g, '').replace(',', '.')) || 0;
      vb = parseFloat((vb || '0').replace(/\./g, '').replace(',', '.')) || 0;
    }
    if (va < vb) return ordenAsc ? -1 : 1;
    if (va > vb) return ordenAsc ? 1 : -1;
    return 0;
  });

  document.getElementById('total-count').textContent = filtrados.length;
  renderTabla(filtrados);
}

fetch('./historico.json')
  .then(r => {
    if (!r.ok) throw new Error('no encontrado');
    return r.json();
  })
  .then(json => {
    datos = json;
    document.getElementById('total-count').textContent = datos.length;
    document.getElementById('last-update').textContent = new Date().toLocaleString('es-ES', { day: '2-digit', month: '2-digit', hour: '2-digit', minute: '2-digit' });
    poblarFiltroEstado();
    aplicarFiltros();
  })
  .catch(() => {
    document.getElementById('contenido').innerHTML =
      '<div class="empty"><strong>Aún no hay datos</strong>El fichero historico.json todavía no existe o está vacío. Aparecerá en cuanto el monitor diario registre su primera licitación.</div>';
  });

document.getElementById('buscar').addEventListener('input', aplicarFiltros);
document.getElementById('filtro-estado').addEventListener('change', aplicarFiltros);
</script>
</body>
</html>
