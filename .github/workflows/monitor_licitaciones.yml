name: Monitor licitaciones PLACSP

on:
  schedule:
    - cron: '8 3 * * *'   # 03:08 UTC = 05:08 hora España en verano (04:08 en invierno) — hora "no en punto" para evitar picos de carga en Actions, con margen amplio antes del inicio de la jornada
  workflow_dispatch:        # permite ejecución manual desde la pestaña Actions

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Instalar dependencias
        run: pip install -r requirements.txt

      - name: Ejecutar script
        env:
          TEAMS_WEBHOOK_URL: ${{ secrets.TEAMS_WEBHOOK_URL }}
          SOLVENCIA_EMPRESA: ${{ secrets.SOLVENCIA_EMPRESA }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python fetch_licitaciones.py

      - name: Commit estado actualizado
        run: |
          git config --local user.email "actions@github.com"
          git config --local user.name "GitHub Actions"
          git add filtros.json filtros/
          git diff --quiet --cached || git commit -m "Actualización diaria licitaciones $(date +%F)"
          git pull --rebase origin main
          git push
