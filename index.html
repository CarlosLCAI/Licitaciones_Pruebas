<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Monitor Licitaciones · CAI Consultores</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;500;600&family=Barlow+Condensed:wght@500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --teal: #07AAAA;
    --teal-dark: #055f5f;
    --navy: #18303C;
    --pink: #ED2E63;
    --paper: #F7F6F2;
    --ink: #1a1a1a;
    --ink-soft: #565650;
    --border: #d7d5cc;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    background: var(--paper);
    background-image:
      linear-gradient(var(--border) 1px, transparent 1px),
      linear-gradient(90deg, var(--border) 1px, transparent 1px);
    background-size: 24px 24px;
    background-attachment: fixed;
    font-family: 'Barlow', sans-serif;
    color: var(--ink);
  }
  .wrap { max-width: 1180px; margin: 0 auto; padding: 32px 24px 64px; }
  .cajetin {
    background: #fff;
    border: 1.5px solid var(--navy);
    display: grid;
    grid-template-columns: 1.4fr 1fr 1fr 1fr;
    margin-bottom: 28px;
  }
  .cajetin > div {
    padding: 14px 18px;
    border-left: 1px solid var(--border);
  }
  .cajetin > div:first-child { border-left: none; }
  .cajetin .label {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 11px;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: var(--ink-soft);
    margin: 0 0 4px;
  }
  .cajetin .value {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 600;
    font-size: 17px;
    color: var(--navy);
    margin: 0;
  }
  .cajetin .value.teal { color: var(--teal-dark); }
  .tabs {
    display: flex;
    gap: 2px;
    margin-bottom: 16px;
    border-bottom: 2px solid var(--navy);
  }
  .tab {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 600;
    font-size: 13px;
    letter-spacing: 0.03em;
    text-transform: uppercase;
    padding: 9px 18px;
    background: #ece9e1;
    color: var(--ink-soft);
    border: none;
    cursor: pointer;
  }
  .tab.active {
    background: var(--navy);
    color: #fff;
  }
  .tab .count {
    font-family: 'JetBrains Mono', monospace;
    font-weight: 400;
    opacity: 0.75;
    margin-left: 6px;
  }
  .controls {
    display: flex;
    gap: 10px;
    margin-bottom: 18px;
    flex-wrap: wrap;
  }
  .controls input, .controls select {
    font-family: 'Barlow', sans-serif;
    font-size: 14px;
    padding: 8px 12px;
    border: 1px solid var(--border);
    background: #fff;
    color: var(--ink);
  }
  .controls input { flex: 1; min-width: 220px; }
  table {
    width: 100%;
    table-layout: fixed;
    border-collapse: collapse;
    background: #fff;
    border: 1px solid var(--border);
    font-size: 13.5px;
  }
  th:nth-child(1), td:nth-child(1) { width: 60px; }
  th:nth-child(2), td:nth-child(2) { width: 30%; }
  th:nth-child(3), td:nth-child(3) { width: 16%; }
  th:nth-child(4), td:nth-child(4) { width: 9%; }
  th:nth-child(5), td:nth-child(5) { width: 60px; }
  th:nth-child(6), td:nth-child(6) { width: 90px; }
  th:nth-child(7), td:nth-child(7) { width: 100px; }
  th:nth-child(8), td:nth-child(8) { width: 80px; }
  th:nth-child(9), td:nth-child(9) { width: 70px; }
  thead th {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 600;
    font-size: 11.5px;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    text-align: left;
    color: #fff;
    background: var(--navy);
    padding: 10px 12px;
    cursor: pointer;
    user-select: none;
    white-space: nowrap;
  }
  .exp-vertical {
    writing-mode: vertical-rl;
    transform: rotate(180deg);
    text-align: right;
    white-space: nowrap;
  }
  thead th:hover { background: var(--teal-dark); }
  tbody td {
    padding: 10px 12px;
    border-top: 1px solid var(--border);
    vertical-align: top;
  }
  tbody tr:hover { background: #f0faf9; }
  .titulo { font-weight: 500; max-width: 340px; }
  .mono { font-family: 'JetBrains Mono', monospace; font-size: 12.5px; color: var(--ink-soft); }
  .importe { font-family: 'JetBrains Mono', monospace; text-align: right; white-space: nowrap; }
  .badge {
    display: inline-block;
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.04em;
    padding: 2px 8px;
    border-radius: 2px;
  }
  .badge-PUB { background: #e1f5ee; color: #085041; }
  .badge-EV { background: #e6f1fb; color: #0c447c; }
  .badge-ADJ { background: #fbeaf0; color: #72243e; }
  .badge-other { background: #f1efe8; color: #444441; }
  .links { display: flex; flex-direction: column; gap: 3px; }
  .links a {
    font-size: 11.5px;
    color: var(--teal-dark);
    text-decoration: none;
    border-bottom: 1px dotted var(--teal-dark);
    width: fit-content;
  }
  .links a:hover { color: var(--pink); border-color: var(--pink); }
  .empty {
    text-align: center;
    padding: 60px 20px;
    color: var(--ink-soft);
    font-size: 14px;
  }
  .empty strong { display: block; font-size: 16px; color: var(--navy); margin-bottom: 6px; }
  .resumen-lectura {
    display: none;
    margin-top: 24px;
    padding-top: 14px;
    border-top: 1px solid var(--navy);
    font-family: 'JetBrains Mono', monospace;
    font-size: 12.5px;
    color: var(--ink-soft);
    text-align: center;
  }
  .filtro-selector-row { display: flex; align-items: center; gap: 6px; }
  #selector-filtro {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 600;
    font-size: 15px;
    color: var(--teal-dark);
    border: none;
    background: transparent;
    padding: 2px 0;
    cursor: pointer;
  }
  #selector-filtro option:disabled { color: var(--ink-soft); }
  #btn-detalle-filtro {
    font-family: 'Barlow', sans-serif;
    font-size: 16px;
    line-height: 1;
    color: var(--ink-soft);
    background: #ece9e1;
    border: 1px solid var(--border);
    width: 26px;
    height: 26px;
    cursor: pointer;
    flex-shrink: 0;
  }
  #btn-detalle-filtro:hover { background: var(--teal); color: #fff; }
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(24, 48, 60, 0.55);
    z-index: 100;
    align-items: center;
    justify-content: center;
  }
  .modal-overlay.abierto { display: flex; }
  .modal-panel {
    background: #fff;
    border: 1.5px solid var(--navy);
    width: 420px;
    max-width: 90vw;
  }
  .modal-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 14px 18px;
    background: var(--navy);
  }
  .modal-titulo {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 600;
    font-size: 15px;
    color: #fff;
    margin: 0;
  }
  #btn-cerrar-modal {
    background: none;
    border: none;
    color: #fff;
    font-size: 15px;
    cursor: pointer;
  }
  .modal-body { padding: 18px; font-size: 13.5px; }
  .modal-body dl { margin: 0; }
  .modal-body dt {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 11px;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    color: var(--ink-soft);
    margin-top: 14px;
  }
  .modal-body dt:first-child { margin-top: 0; }
  .modal-body dd {
    margin: 4px 0 0;
    font-family: 'JetBrains Mono', monospace;
    font-size: 12.5px;
  }
</style>
</head>
<body>
<div class="wrap">

  <div class="cajetin">
    <div>
      <p class="label">Monitor</p>
      <p class="value teal">CAI Consultores</p>
    </div>
    <div class="filtro-box">
      <p class="label">Filtro</p>
      <div class="filtro-selector-row">
        <select id="selector-filtro">
          <option value="filtro1">Diseño Urbano Andalucía</option>
          <option value="filtro2" disabled>Filtro 2 (próximamente)</option>
          <option value="filtro3" disabled>Filtro 3 (próximamente)</option>
          <option value="filtro4" disabled>Filtro 4 (próximamente)</option>
        </select>
        <button id="btn-detalle-filtro" aria-label="Ver criterios del filtro">⋯</button>
      </div>
    </div>
    <div>
      <p class="label">Resultados visibles</p>
      <p class="value" id="total-count">—</p>
    </div>
    <div>
      <p class="label">Última lectura registrada</p>
      <p class="value" id="last-update">—</p>
    </div>
  </div>

  <div class="tabs" id="tabs"></div>

  <div class="controls">
    <input type="text" id="buscar" placeholder="Buscar por título, órgano o expediente">
    <select id="filtro-estado">
      <option value="">Todos los estados</option>
    </select>
  </div>

  <div id="contenido">
    <p class="empty">Cargando…</p>
  </div>

  <div id="resumen-lectura" class="resumen-lectura"></div>

  <div id="modal-overlay" class="modal-overlay">
    <div class="modal-panel">
      <div class="modal-header">
        <p class="modal-titulo" id="modal-titulo">Criterios del filtro</p>
        <button id="btn-cerrar-modal" aria-label="Cerrar">✕</button>
      </div>
      <div class="modal-body" id="modal-body">Cargando…</div>
    </div>
  </div>

</div>

<script>
let datos = [];
let metaLectura = null;
let pestanaActiva = 'ultima';
let ordenColumna = 'updated';
let ordenAsc = false;
let fechaUltimaLectura = null;
let filtroConfigActual = null;

function formatearImporte(v) {
  if (!v) return '—';
  const n = parseFloat(v);
  if (isNaN(n)) return v;
  return n.toLocaleString('es-ES', { minimumFractionDigits: 2, maximumFractionDigits: 2 }) + ' €';
}

function formatearFecha(v) {
  if (!v) return '—';
  const d = new Date(v);
  if (isNaN(d)) return v;
  return d.toLocaleDateString('es-ES', { day: '2-digit', month: '2-digit', year: 'numeric' });
}

function celdaFechaLimite(v) {
  if (!v) return '—';
  const limite = new Date(v);
  if (isNaN(limite)) return v;
  const hoy = new Date();
  hoy.setHours(0, 0, 0, 0);
  const dias = Math.round((limite - hoy) / (1000 * 60 * 60 * 24));
  const texto = formatearFecha(v);
  if (dias < 0) return texto;
  if (dias <= 5) return '<span style="color: var(--pink); font-weight: 500;">' + texto + ' (' + dias + 'd)</span>';
  return texto + ' (' + dias + 'd)';
}

function badgeClass(estado) {
  return ['PUB', 'EV', 'ADJ'].includes(estado) ? 'badge-' + estado : 'badge-other';
}

function esVigente(d) {
  if (!d.fecha_limite) return false;
  const limite = new Date(d.fecha_limite);
  const hoy = new Date();
  hoy.setHours(0, 0, 0, 0);
  return !isNaN(limite) && limite >= hoy;
}

function datosPorPestana() {
  if (pestanaActiva === 'ultima') {
    return datos.filter(d => d.fecha_captura === fechaUltimaLectura);
  }
  if (pestanaActiva === 'enplazo') {
    return datos.filter(esVigente);
  }
  return datos;
}

function renderTabs() {
  const ultima = datos.filter(d => d.fecha_captura === fechaUltimaLectura).length;
  const enPlazo = datos.filter(esVigente).length;
  const tabsEl = document.getElementById('tabs');
  tabsEl.innerHTML =
    '<button class="tab' + (pestanaActiva === 'ultima' ? ' active' : '') + '" data-tab="ultima">Última lectura<span class="count">' + ultima + '</span></button>' +
    '<button class="tab' + (pestanaActiva === 'enplazo' ? ' active' : '') + '" data-tab="enplazo">En plazo<span class="count">' + enPlazo + '</span></button>' +
    '<button class="tab' + (pestanaActiva === 'todas' ? ' active' : '') + '" data-tab="todas">Todas<span class="count">' + datos.length + '</span></button>';

  tabsEl.querySelectorAll('.tab').forEach(btn => {
    btn.addEventListener('click', () => {
      pestanaActiva = btn.dataset.tab;
      renderTabs();
      aplicarFiltros();
    });
  });
}

function renderResumenLectura() {
  const el = document.getElementById('resumen-lectura');
  if (pestanaActiva !== 'ultima' || !metaLectura) {
    el.style.display = 'none';
    return;
  }
  const fecha = new Date(metaLectura.fecha_hora);
  const horaStr = isNaN(fecha)
    ? metaLectura.fecha_hora
    : fecha.toLocaleString('es-ES', { day: '2-digit', month: '2-digit', hour: '2-digit', minute: '2-digit' }) + ' UTC';
  el.style.display = 'block';
  el.textContent = 'Última búsqueda: ' + horaStr +
    ' · ' + metaLectura.total_entries_leidas + ' licitaciones leídas' +
    ' · ' + metaLectura.paginas + ' páginas' +
    ' · ' + metaLectura.nuevas_filtradas + ' nuevas filtradas';
}

function renderTabla(lista) {
  const cont = document.getElementById('contenido');
  if (!lista.length) {
    cont.innerHTML = '<div class="empty"><strong>Sin resultados</strong>No hay licitaciones que coincidan con esta pestaña o búsqueda.</div>';
    return;
  }
  let html = '<table><thead><tr>' +
    '<th data-col="folder_id">Exp</th>' +
    '<th data-col="titulo">Título</th>' +
    '<th data-col="organo">Órgano</th>' +
    '<th data-col="importe">Importe</th>' +
    '<th data-col="estado">Estado</th>' +
    '<th data-col="updated">Fecha licitación</th>' +
    '<th data-col="fecha_limite">Fecha límite</th>' +
    '<th data-col="fecha_captura">Detectada el</th>' +
    '<th>Documentos</th>' +
    '</tr></thead><tbody>';
  for (const r of lista) {
    html += '<tr>' +
      '<td class="mono exp-vertical">' + (r.folder_id || '—') + '</td>' +
      '<td class="titulo">' + (r.titulo || '—') + '</td>' +
      '<td>' + (r.organo || '—') + '</td>' +
      '<td class="importe">' + formatearImporte(r.importe) + '</td>' +
      '<td><span class="badge ' + badgeClass(r.estado) + '">' + (r.estado || '—') + '</span></td>' +
      '<td class="mono">' + formatearFecha(r.updated) + '</td>' +
      '<td class="mono">' + celdaFechaLimite(r.fecha_limite) + '</td>' +
      '<td class="mono">' + (r.fecha_captura || '—') + '</td>' +
      '<td class="links">' +
        (r.link ? '<a href="' + r.link + '" target="_blank" rel="noopener">Ficha</a>' : '') +
        (r.pcap_url ? '<a href="' + r.pcap_url + '" target="_blank" rel="noopener">PCAP</a>' : '') +
        (r.ppt_url ? '<a href="' + r.ppt_url + '" target="_blank" rel="noopener">PPT</a>' : '') +
      '</td>' +
    '</tr>';
  }
  html += '</tbody></table>';
  cont.innerHTML = html;

  cont.querySelectorAll('th[data-col]').forEach(th => {
    th.addEventListener('click', () => {
      const col = th.dataset.col;
      if (ordenColumna === col) { ordenAsc = !ordenAsc; } else { ordenColumna = col; ordenAsc = true; }
      aplicarFiltros();
    });
  });
}

function poblarFiltroEstado() {
  const select = document.getElementById('filtro-estado');
  select.innerHTML = '<option value="">Todos los estados</option>';
  const estados = [...new Set(datos.map(d => d.estado).filter(Boolean))];
  for (const e of estados) {
    const opt = document.createElement('option');
    opt.value = e;
    opt.textContent = e;
    select.appendChild(opt);
  }
}

function aplicarFiltros() {
  const texto = document.getElementById('buscar').value.toLowerCase();
  const estado = document.getElementById('filtro-estado').value;

  let filtrados = datosPorPestana().filter(d => {
    const coincideTexto = !texto ||
      (d.titulo && d.titulo.toLowerCase().includes(texto)) ||
      (d.organo && d.organo.toLowerCase().includes(texto)) ||
      (d.folder_id && d.folder_id.toLowerCase().includes(texto));
    const coincideEstado = !estado || d.estado === estado;
    return coincideTexto && coincideEstado;
  });

  filtrados.sort((a, b) => {
    let va = a[ordenColumna] || '';
    let vb = b[ordenColumna] || '';
    if (ordenColumna === 'importe') {
      va = parseFloat(va) || 0;
      vb = parseFloat(vb) || 0;
    }
    if (va < vb) return ordenAsc ? -1 : 1;
    if (va > vb) return ordenAsc ? 1 : -1;
    return 0;
  });

  document.getElementById('total-count').textContent = filtrados.length;
  renderTabla(filtrados);
  renderResumenLectura();
}

function pintarModalFiltro(cfg) {
  const body = document.getElementById('modal-body');
  const titulo = document.getElementById('modal-titulo');
  if (!cfg) {
    titulo.textContent = 'Criterios del filtro';
    body.innerHTML = '<p>Configuración no disponible.</p>';
    return;
  }
  const cpv = (cfg.cpv_permitidos && cfg.cpv_permitidos.length) ? cfg.cpv_permitidos.join(', ') : 'Todos';
  const estados = (cfg.estados_permitidos && cfg.estados_permitidos.length) ? cfg.estados_permitidos.join(', ') : 'Todos';
  titulo.textContent = cfg.nombre || 'Criterios del filtro';
  body.innerHTML =
    '<dl>' +
    '<dt>Región · NUTS</dt><dd>' + (cfg.region || '—') + ' · ' + (cfg.nuts_prefix || '—') + '</dd>' +
    '<dt>Códigos CPV</dt><dd>' + cpv + '</dd>' +
    '<dt>Estados admitidos</dt><dd>' + estados + '</dd>' +
    '</dl>';
}

Promise.all([
  fetch('./historico.json').then(r => r.ok ? r.json() : []).catch(() => []),
  fetch('./ultima_lectura.json').then(r => r.ok ? r.json() : null).catch(() => null),
  fetch('./filtro_config.json').then(r => r.ok ? r.json() : null).catch(() => null)
]).then(([hist, meta, cfg]) => {
  datos = hist;
  metaLectura = meta;
  filtroConfigActual = cfg;
  if (datos.length) {
    fechaUltimaLectura = datos.reduce((max, d) => {
      return (d.fecha_captura && d.fecha_captura > max) ? d.fecha_captura : max;
    }, '');
    document.getElementById('last-update').textContent = fechaUltimaLectura;
  }
  poblarFiltroEstado();
  renderTabs();
  aplicarFiltros();
}).catch(() => {
  document.getElementById('tabs').innerHTML = '';
  document.getElementById('contenido').innerHTML =
    '<div class="empty"><strong>Aún no hay datos</strong>Los ficheros de datos todavía no existen. Aparecerán en cuanto el monitor diario se ejecute por primera vez.</div>';
});

document.getElementById('buscar').addEventListener('input', aplicarFiltros);
document.getElementById('filtro-estado').addEventListener('change', aplicarFiltros);

document.getElementById('btn-detalle-filtro').addEventListener('click', () => {
  pintarModalFiltro(filtroConfigActual);
  document.getElementById('modal-overlay').classList.add('abierto');
});

document.getElementById('btn-cerrar-modal').addEventListener('click', () => {
  document.getElementById('modal-overlay').classList.remove('abierto');
});

document.getElementById('modal-overlay').addEventListener('click', (e) => {
  if (e.target.id === 'modal-overlay') {
    document.getElementById('modal-overlay').classList.remove('abierto');
  }
});

document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape') {
    document.getElementById('modal-overlay').classList.remove('abierto');
  }
});
</script>
</body>
</html>
